name: Audioflow Speaker Selector
description: Local control of Audioflow speaker switches over MQTT, with Home Assistant discovery.
version: "0.8.3"
slug: audioflow2mqtt
init: false
startup: application
boot: auto
stage: experimental
arch:
  - amd64
  - aarch64
  - armv7
discovery:
  - mqtt
services:
  - mqtt:need
hassio_api: true
host_network: true
url: https://github.com/henrycarteruk/ha-audioflow2mqtt

options:
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  qos: 1
  base_topic: audioflow2mqtt
  devices: []
  log_level: info

schema:
  mqtt_host: str?
  mqtt_port: int?
  mqtt_user: str?
  mqtt_pass: password?
  qos: int(0,2)?
  base_topic: str
  devices:
    - str?
  log_level: list(debug|info|warning|error)
